## -*- mode: perl; -*-
## OpenSSL Configure target for WebAssembly / WASI preview 2.
##
## Copied into third_party/openssl/Configurations/ by the build.
## Requires $ENV{WASI_SDK} pointing at a wasi-sdk 33 install.

my $wasi_sdk  = $ENV{WASI_SDK}  // "/opt/wasi-sdk";
my $wasi_triple = "wasm32-wasip2";
my $sysroot   = "$wasi_sdk/share/wasi-sysroot";

my %targets = (
    "wasm32-wasip2" => {
        inherit_from     => [ "BASE_unix" ],
        CC               => "$wasi_sdk/bin/clang",
        CXX              => "$wasi_sdk/bin/clang++",
        AR               => "$wasi_sdk/bin/llvm-ar",
        RANLIB           => "$wasi_sdk/bin/llvm-ranlib",
        LD               => "$wasi_sdk/bin/wasm-ld",

        CFLAGS           => "-O2 -fno-strict-aliasing -Wall",
        CXXFLAGS         => "-O2 -fno-strict-aliasing -Wall",
        LDFLAGS          => "--target=$wasi_triple --sysroot=$sysroot",

        # Emulated libc features that wasi-libc provides via -l flags.
        # OPENSSL_WASM_SIMD_FLAG and OPENSSL_WASM_REPRO_FLAGS are
        # exported by the top-level Makefile.
        cflags           => join(" ",
            "--target=$wasi_triple",
            "--sysroot=$sysroot",
            $ENV{OPENSSL_WASM_SIMD_FLAG} // "",
            $ENV{OPENSSL_WASM_REPRO_FLAGS} // "",
            "-D_WASI_EMULATED_MMAN",
            "-D_WASI_EMULATED_SIGNAL",
            "-D_WASI_EMULATED_PROCESS_CLOCKS",
            "-D_WASI_EMULATED_GETPID",
            # OpenSSL feature hints
            "-DOPENSSL_NO_SECURE_MEMORY",   # no mlock on wasi
            "-DOPENSSL_NO_ASYNC",
            "-DOPENSSL_NO_KTLS",
            "-DOPENSSL_NO_DEVCRYPTOENG",
            "-DOPENSSL_NO_UNIX_SOCK",   # wasi-libc lacks sockaddr_un.sun_path
            "-DOPENSSL_SMALL_FOOTPRINT",
            # wasi-libc stdio: many platforms lack POSIX locking primitives
            "-DNO_SYSLOG",
            "-DOPENSSL_NO_POSIX_IO=0",
        ),

        # Libraries pulled in at final link for emulated features
        ex_libs          => join(" ",
            "-lwasi-emulated-mman",
            "-lwasi-emulated-signal",
            "-lwasi-emulated-process-clocks",
            "-lwasi-emulated-getpid",
        ),

        bn_ops           => "BN_LLONG RC4_CHAR",
        thread_scheme    => "(unknown)",
        dso_scheme       => "",
        asm_arch         => undef,
        perlasm_scheme   => "void",
        shared_target    => "",
        shared_extension => "",

        # Hard-disabled features for wasm
        disable          => [
            "threads",
            "shared",
            "dso",
            "asm",
            "engine",
            "async",
            "afalgeng",
            "ktls",
            "ui-console",
            "autoload-config",
            "module",
            "tests",
            "apps",
            "docs",
            # stdio: needed for X509_STORE_load_file, PEM file I/O etc.
            #   wasi-libc provides enough locking primitives for single-
            #   threaded use, so keep stdio on.
            "secure-memory",
            "cached-fetch",
        ],

        # Nothing to exclude; we keep sock support for libssl over wasi:sockets
        enable           => [
            "tls1_2",
            "tls1_3",
            "dtls1_2",
            "ec",
            "ecdh",
            "ecdsa",
            "rfc3779",
            "cms",
        ],
    },
);
