name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install wasi-sdk
        run: |
          bash scripts/install-wasi-sdk.sh
          echo "WASI_SDK=$PWD/.wasi-sdk" >> "$GITHUB_ENV"

      - name: Install wasm-tools and wit-bindgen
        run: |
          cargo install --locked wasm-tools@1.247.0
          cargo install --locked wit-bindgen-cli@0.48.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and openssl build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            examples/host/target/
            examples/https-fetch/target/
            examples/sign-service/target/
            build/openssl/
          key: ${{ runner.os }}-cargo-${{ hashFiles('examples/host/Cargo.toml', 'third_party/openssl/VERSION.dat') }}

      - name: Fetch Mozilla CA bundle
        # Ensures the TLS verify-required test uses a known-good CA
        # bundle regardless of runner defaults.
        run: bash scripts/fetch-mozilla-ca.sh

      - name: Build component
        run: make component

      - name: Run test suite
        run: make test

      - name: Static analysis
        run: make check

      - name: SBOM
        run: make sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.os }}
          path: build/openssl-component.sbom.json
          if-no-files-found: error

      - name: Reproducible build check (linux only, expensive)
        if: matrix.os == 'ubuntu-latest'
        run: make repro-check
